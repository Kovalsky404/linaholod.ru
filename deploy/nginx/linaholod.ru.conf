# nginx reverse-proxy для linaholod.ru
# Кладётся в /etc/nginx/sites-available/linaholod.ru.conf и линкуется в sites-enabled.
# nginx (80/443) -> Next.js (127.0.0.1:3000). Канонический домен — apex (linaholod.ru).
#
# Порядок поднятия: см. deploy/README.md (сначала HTTP + получить сертификат, потом 443).

# ── HTTP: ACME-проверка Let's Encrypt + редирект на HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name linaholod.ru www.linaholod.ru;

    # webroot для certbot (challenge-файлы)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://linaholod.ru$request_uri;
    }
}

# ── HTTPS www → apex (убираем дубль-домен) ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.linaholod.ru;

    ssl_certificate     /etc/letsencrypt/live/linaholod.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linaholod.ru/privkey.pem;

    return 301 https://linaholod.ru$request_uri;
}

# ── HTTPS apex: проксируем в Next.js ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name linaholod.ru;

    ssl_certificate     /etc/letsencrypt/live/linaholod.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linaholod.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # Форма заявки маленькая — крупные тела не нужны.
    client_max_body_size 2m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Иммутабельная статика Next — длинный кэш.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Стриминг Next.js: отключаем буферизацию (см. доку self-hosting).
        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }
}
